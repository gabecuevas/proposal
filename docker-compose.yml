version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: proposal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: proposal
      POSTGRES_USER: proposal
      POSTGRES_PASSWORD: proposal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proposal -d proposal"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: proposal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
