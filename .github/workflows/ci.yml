name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: proposal
          POSTGRES_USER: proposal
          POSTGRES_PASSWORD: proposal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proposal -d proposal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://proposal:proposal@localhost:5432/proposal
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci-auth-secret
      NEXTAUTH_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: proposal-docs
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability audit
        run: pnpm audit --prod --audit-level high

      - name: Migration safety check (schema changes require migration)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          CHANGED="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          echo "${CHANGED}"
          if echo "${CHANGED}" | rg -q "^packages/db/prisma/schema.prisma$"; then
            if ! echo "${CHANGED}" | rg -q "^packages/db/prisma/migrations/.+/migration.sql$"; then
              echo "Schema changed without a migration.sql file."
              exit 1
            fi
          fi

      - name: Generate Prisma client
        run: pnpm --filter @repo/db prisma:generate

      - name: Apply migrations
        run: pnpm --filter @repo/db prisma:deploy

      - name: Seed database
        run: pnpm --filter @repo/db seed

      - name: Verify local service connectivity
        run: pnpm doctor

      - name: Run quality gates
        run: pnpm ci:quality
